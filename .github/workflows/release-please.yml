name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write

concurrency:
  group: release-please-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    name: Release Please
    runs-on:
      - self-hosted
      - linux
      - x64
      - node22
      - uniauth
      - ci
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on:
      - self-hosted
      - linux
      - x64
      - node22
      - uniauth
      - release
    timeout-minutes: 20
    defaults:
      run:
        working-directory: uniauth-oauth-oidc-provider
    steps:
      - name: Checkout core
        uses: actions/checkout@v6
        with:
          repository: alyldas/uniauth-core
          path: uniauth-core
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: uniauth-oauth-oidc-provider
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: uniauth-oauth-oidc-provider/package-lock.json
          registry-url: https://npm.pkg.github.com
          scope: '@alyldas'
      - name: Build core
        working-directory: uniauth-core
        run: npm ci && npm run build
      - name: Install dependencies
        run: npm ci
      - name: Check
        run: npm run check
      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
