name: Bug report
description: Report a reproducible UniAuth package bug.
title: 'fix: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Keep the report focused on reproducible behavior. If this is a security issue, use the private security reporting path instead.

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: 0.1.0
    validations:
      required: true

  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      render: ts
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        Node.js:
        npm:
        TypeScript:
        OS:
    validations:
      required: true
